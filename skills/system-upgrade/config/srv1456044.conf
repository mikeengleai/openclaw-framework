NTFY_TOPIC="1klaw-system-update"
SLACK_CHANNEL="C0ALHF9QF6F"   # #1klaw-main

RUN_CONNECTOR_TESTS=0

REQUIRE_CANARY_PASS=1
CANARY_HOST="englebert1"
CANARY_SHARE_PATH="/home/openclaw/shared"   # canary host's tailscale share, accessed manually or via tailscale
