OPENCLAW_NPM_PACKAGE="openclaw"
OPENCLAW_DOCKER_COMPOSE=""
OPENCLAW_DOCKER_PROJECT=""
OPENCLAW_DOCKER_GATEWAY_CONTAINER=""
